">Leaderboard [after round 1]</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg18"><line style="stroke:#181818;stroke-width:1;" x1="316.4229" x2="358.4229" y1="951.6797" y2="951.6797"/><line style="stroke:#181818;stroke-width:1;" x1="358.4229" x2="358.4229" y1="951.6797" y2="964.6797"/><line style="stroke:#181818;stroke-width:1;" x1="317.4229" x2="358.4229" y1="964.6797" y2="964.6797"/><polygon fill="#181818" points="327.4229,960.6797,317.4229,964.6797,327.4229,968.6797,323.4229,964.6797" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="136.1445" x="342.4373" y="916.3481">pair by current score</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.1733" x="323.4229" y="931.481">(same-score players meet,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137.6235" x="341.6978" y="946.6138">rematches excluded)</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg19"><polygon fill="#181818" points="129.8374,989.8125,119.8374,993.8125,129.8374,997.8125,125.8374,993.8125" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="123.8374" x2="310.4229" y1="993.8125" y2="993.8125"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163.5854" x="133.3374" y="988.7466">List&lt;Contest&gt;  [round 2]</text></g><path d="M50,1006.8125 L50,1076.8125 L1336,1076.8125 L1336,1016.8125 L1326,1006.8125 L50,1006.8125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1326,1006.8125 L1326,1016.8125 L1336,1016.8125 L1326,1006.8125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.416" x="461.6067" y="1023.8794">The loop repeats for every subsequent round.\n</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.9863" x="461.6067" y="1039.0122">SwissPairing cannot emit round N+1\n</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.3345" x="461.6067" y="1054.145">before every contest in round N is decided.\n</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="454.1177" x="461.6067" y="1069.2778">Adaptive formats read only decided results &#8212; never provisional ones.</text><g class="message" data-entity-1="part1" data-entity-2="part3" id="msg20"><polygon fill="#181818" points="607.104,1099.4766,617.104,1103.4766,607.104,1107.4766,611.104,1103.4766" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="118.8374" x2="613.104" y1="1103.4766" y2="1103.4766"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91.2158" x="323.3628" y="1098.4106">compute(this)</text></g><g class="message" data-entity-1="part3" data-entity-2="part1" id="msg21"><polygon fill="#181818" points="129.8374,1128.6094,119.8374,1132.6094,129.8374,1136.6094,125.8374,1132.6094" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="123.8374" x2="623.104" y1="1132.6094" y2="1132.6094"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="114.7085" x="314.1165" y="1127.5435">final Leaderboard</text></g><path d="M50,1145.6094 L50,1230.6094 L1336,1230.6094 L1336,1155.6094 L1326,1145.6094 L50,1145.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1326,1145.6094 L1326,1155.6094 L1336,1155.6094 L1326,1145.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="386.0264" x="478.0