 textLength="183.9551" x="518.7886" y="388.0591">(position, token, completed)</text></g><rect fill="#E2E2F0" height="30.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="163.29" x="733.6187" y="359.8281"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="149.29" x="740.6187" y="379.8232">StandingContribution</text><path d="M820,406.125 L820,431.125 L1390,431.125 L1390,416.125 L1380,406.125 L820,406.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1380,406.125 L1380,416.125 L1390,416.125 L1380,406.125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="549.5229" x="826" y="423.1919">token examples:\n"won", "drew", "lost",\n"1st", "3rd" &#8212; never\na goal count or time</text><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg7"><polygon fill="#181818" points="272.002,453.3906,262.002,457.3906,272.002,461.3906,268.002,457.3906" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="266.002" x2="481.9136" y1="457.3906" y2="457.3906"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="138.6265" x="302.6445" y="452.3247">StandingContribution</text></g><g class="message" data-entity-1="part2" data-entity-2="part6" id="msg8"><polygon fill="#181818" points="978.7378,482.5234,988.7378,486.5234,978.7378,490.5234,982.7378,486.5234" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="261.002" x2="984.7378" y1="486.5234" y2="486.5234"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.2178" x="532.261" y="481.4575">points(standingContribution)</text></g><path d="M1005,499.5234 L1005,524.5234 L1624,524.5234 L1624,509.5234 L1614,499.5234 L1005,499.5234" fill="#FEFFDD" style="stroke:#1818