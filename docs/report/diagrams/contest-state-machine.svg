9883,189.5938 L960.9883,199.5938 L970.9883,199.5938 L960.9883,189.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.6304" x="687" y="206.6606">Decided states that carry a Result:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.103" x="687" y="221.7935">FINISHED, FORFEITED, WALKOVER,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.9883" x="687" y="236.9263">ABANDONED (if discipline says "stands").</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="687" y="252.0591">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.6982" x="687" y="267.1919">States that carry NO Result:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.6948" x="687" y="282.3247">SCHEDULED, IN_PROGRESS,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209.5933" x="687" y="297.4575">SUSPENDED, CANCELLED_VOID.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="57" id="ent0006"><path d="M142,902.0938 L142,933.5938 L107.05,937.5938 L142,941.5938 L142,972.625 A0,0 0 0 0 142,972.625 L382.3496,972.625 A0,0 0 0 0 382.3496,972.625 L382.3496,912.0938 L372.3496,902.0938 L142,902.0938 A0,0 0 0 0 142,902.0938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><path d="M372.3496,902.0938 L372.3496,912.0938 L382.3496,912.0938 L372.3496,902.0938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.7832" x="148" y="919.1606">No Result is produced.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.3916" x="148" y="934.2935">Contest is in a pause state.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="219.3496" x="148" y="949.4263">TerminationRule is not re-queried</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.5093" x="148" y="964.5591">until play resumes.</text></g><g class="entity" data-qualified-name="GMN8" data-source-line="64" id="ent0009"><path d="M205.5,680.5938 L205.5,735.9922 A0,0 0 0 0 205.5,735.9922 L522.8467,735.9922 A0,0 0 0 0 522.8467,735.9922 L522.8467,690.5938 L512.8467,680.5938 L368.36,680.5938 L365.67,582.7838 L360.36,680.5938 L205.5,680.5938 A0,0 0 0 0 205.5,680.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><path d="M512.8467,680.5938 L512.8467,690.5938 L522.8467,690.5938 L512.8467,680.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.3467" x="211.5" y="697.6606">The only legal path backward from FINISHED.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5698" x="211.5" y="712.7935">Requires an explicit, audited admin action.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.1943" x="211.5" y="727.9263">Never a silent in-place edit.</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="81" id="ent0012"><path d="M1795,189.5938 L1795,243.5938 L1760.24,247.5938 L1795,251.5938 L1795,305.5234 A0,0 0 0 0 1795,305.5234 L2103.0854,305.5234 A0,0 0 0 0 2103.0854,305.5234 L2103.0854,199.5938 L2093.0854,189.5938 L1795,189.5938 A0,0 0 0 0 1795,189.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><path d="M2093.0854,189.5938 L2093.0854,199.5938 L2103.0854,199.5938 L2093.0854,189.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.2051" x="1801" y="206.6606">A Participation reaches a terminal status</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.6797" x="1801" y="221.7935">only AT OR AFTER the Contest is decided.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.4976" x="1801" y="236.9263">(In a race: runner by runner.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.8975" x="1805.1323" y="252.0591">In football: both sides at full time.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.0854" x="1801" y="267.1919">For ranking disciplines, FINISHED is reached</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="266.6523" x="1801" y="282.3247">only when every Participation is terminal</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.791" x="1801" y="297.4575">or the cutoff time passes.</text></g><!--link *start* to SCHEDULED--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="11" id="lnk4"><path d="M1073,257.8138 C1073,299.2537 1073,463.0237 1073,526.5038" fill="none" id="*start*-to-SCHEDULED" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1073,532.5038,1077,523.5038,1073,527.5038,1069,523.5038,1073,532.5038" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.9194" x="1074" y="485.1606">create Contest</text></g><!--link SCHEDULED to IN_PROGRESS--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="13" id="lnk6"><path d="M1022.83,564.4338 C963.53,572.3438 