L866.7827,184.5938 L856.7827,174.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.6304" x="547" y="191.6606">Decided states that carry a Result:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="228.103" x="547" y="206.7935">FINISHED, FORFEITED, WALKOVER.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.7827" x="547" y="221.9263">An ABANDONED contest carries no Result until</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.3037" x="547" y="237.0591">the discipline accepts it, which moves it to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.9355" x="547" y="252.1919">FINISHED (acceptAbandonedResult).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="547" y="267.3247">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.6982" x="547" y="282.4575">States that carry NO Result:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.9907" x="547" y="297.5903">SCHEDULED, IN_PROGRESS, SUSPENDED,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.9282" x="547" y="312.7231">ABANDONED, CANCELLED_VOID, REOPENED.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="62" id="ent0006"><path d="M836,884.0938 L836,954.625 L1076.3496,954.625 L1076.3496,894.0938 L1066.3496,884.0938 L836,884.0938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><path d="M1066.3496,884.0938 L1066.3496,894.0938 L1076.3496,894.0938 L1066.3496,884.0938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.7832" x="842" y="901.1606">No Result is produced.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.3916" x="842" y="916.2935">Contest is in a pause state.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="219.3496" x="842" y="931.4263">TerminationRule is not re-queried</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.5093" x="842" y="946.5591">until play resumes.</text></g><g class="entity" data-qualified-name="GMN8" data-source-line="69" id="ent0009"><path d="M582.5,680.5938 L582.5,735.9922 L899.8467,735.9922 L899.8467,690.5938 L889.8467,680.5938 L582.5,680.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><path d="M889.8467,680.5938 L889.8467,690.5938 L899.8467,690.5938 L889.8467,680.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.3467" x="588.5" y="697.6606">The only legal path backward from FINISHED.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.5698" x="588.5" y="712.7935">Requires an explicit, audited admin action.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.1943" x="588.5" y="727.9263">Never a silent in-place edit.</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="86" id="ent0012"><path d="M1837,189.5938 L1837,243.5938 L1802.24,247.5938 L1837,251.5938 L1837,305.5234 A0,0 0 0 0 1837,305.5234 L2145.0854,305.5234 A0,0 0 0 0 2145.0854,305.5234 L2145.0854,199.5938 L2135.0854,189.5938 L1837,189.5938 A0,0 0 0 0 1837,189.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><path d="M2135.0854,189.5938 L2135.0854,199.5938 L2145.0854,199.5938 L2135.0854,189.5938" fill="#FFFFF0" style="stroke:#AAAAAA;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.2051" x="1843" y="206.6606">A Participation reaches a terminal status</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.6797" x="1843" y="221.7935">only AT OR AFTER the Contest is decided.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.4976" x="1843" y="236.9263">(In a race: runner by runner.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.8975" x="1847.1323" y="252.0591">In football: both sides at full time.)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.0854" x="1843" y="267.1919">For ranking disciplines, FINISHED is reached</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="266.6523" x="1843" y="282.3247">only when every Participation is terminal</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.791" x="1843" y="297.4575">or the cutoff time passes.</text></g><!--link *start* to SCHEDULED--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="11" id="lnk4"><path d="M1115,257.8138 C1115,299.2537 1115,463.0237 1115,526.5038" fill="none" id="*start*-to-SCHEDULED" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1115,532.5038,1119,523.5038,1115,527.5038,1111,523.5038,1115,532.5038" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.9194" x="1116" y="485.1606">create Contest</text></g><!--link SCHEDULED to IN_PROGRESS--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="